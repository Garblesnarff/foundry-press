name: FoundryPress
options:
  bundleIdPrefix: com.hanson-foundry
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
targets:
  FoundryPress:
    type: application
    platform: macOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hanson-foundry.foundrypress
        PRODUCT_NAME: FoundryPress
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        INFOPLIST_GENERATION_MODE: GeneratedByXcode
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: minimal
